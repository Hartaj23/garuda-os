  production_branch: master
  root_directory: website/
  build_command: python3 scripts/build_site.py
  deploy_root: website/public/
  cloudflare_config: website/wrangler.toml
  custom_domain: drgaruda.com
  public_url: https://drgaruda.com/
  public_announcement: none
