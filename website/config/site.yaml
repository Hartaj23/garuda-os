# Project Garuda — Public Website Configuration
# Phase A — Site Architecture only
# This file creates no institutional authority.

site:
  name: Project Garuda
  tagline: Building institutions worthy of the intelligence they guide.
  phase: complete
  phase_name: Mission 001 — Closed
  mission_status: accepted
  mission_closure: docs/governance/MISSION-001-CLOSURE.md
  mission: Mission 001 — Launch the Public Foundation
  authorization: docs/governance/MISSION-001-PHASE-C-IMPLEMENTATION-AUTHORIZATION.md
  phase_b_closure: docs/governance/MISSION-001-PHASE-B-CLOSURE.md

authority:
  canonical_source: repository
  repository_root: ../
  disclaimer: >
    The public website introduces the institution.
    The repository remains the institution's canonical source of truth.

