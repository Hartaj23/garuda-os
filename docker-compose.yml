version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: infrastructure/backend.Dockerfile
    environment:
      GARUDA_APP_NAME: garuda
      GARUDA_ENVIRONMENT: development
      GARUDA_LOG_LEVEL: INFO
      GARUDA_VERSION: 0.1.0a0
      GARUDA_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: infrastructure/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_APP_VERSION: 0.1.0a0
      NEXT_PUBLIC_ENVIRONMENT: development
      NEXT_PUBLIC_ARCHITECTURE_VERSION: GAR-0001
      NEXT_PUBLIC_SPRINT_VERSION: GAR-SPRINT-0001
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
