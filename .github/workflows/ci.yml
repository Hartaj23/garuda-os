name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/backend/requirements.txt
          pip install ruff black

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: |
          npm --prefix apps/web ci

      - name: Run repository validation
        run: python3 scripts/validate_repository_foundation.py

      - name: Run backend tests
        run: python3 -m unittest discover tests

      - name: Run frontend tests
        run: npm --prefix apps/web run test

      - name: Run linting
        run: |
          python3 -m ruff check .
          npm --prefix apps/web run lint

      - name: Run formatting checks
        run: |
          python3 -m black --check .
          npm --prefix apps/web run format

      - name: Run Docker static validation
        run: python3 scripts/validate_docker.py
